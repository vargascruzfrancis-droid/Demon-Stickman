<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Stickman Shooter - Minigun y Armas Realistas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
  canvas {
  display: block;
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  background: #000;
  cursor: crosshair;
  transform: translateX(-50px); /* ← desplazamiento a la izquierda */
}
  .touch-panel { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; gap: 12px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border-top: 1px solid #aa44ff; z-index: 200; }

  .panel { background: #0a0a2a; border: 2px solid #aa44ff; border-radius: 20px; padding: 20px; width: 550px; max-width: 90%; max-height: 85vh; overflow-y: auto; color: #fff; box-shadow: 0 0 30px rgba(170,68,255,0.5); }

<body>
<canvas id="c"></canvas>
<div id="touchPanel" class="touch-panel hidden">

</div>

</div>
<div id="settingsOverlay" class="overlay" style="display:none;">
  <div class="panel">
    <h2>⚙️ AJUSTES</h2>
    <div class="slider-container"><label>🔊 Efectos: <span id="sfxVolumeValue">100</span>%</label><input type="range" id="sfxVolumeSlider" min="0" max="100" value="100"></div>

    <div class="slider-container"><label>⚡ FPS:</label><div class="fps-buttons"><div class="fps-btn" data-fps="30">30</div><div class="fps-btn" data-fps="60">60</div><div class="fps-btn" data-fps="120">120</div><div class="fps-btn" data-fps="0">∞</div></div></div>

<script>
const isMobile=/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)||(window.innerWidth<=768);
if(isMobile) document.getElementById('touchPanel').classList.remove('hidden');
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
canvas.width=900; canvas.height=450;

// ── SETTINGS (sin cambios) ─────────────────────────────────────────
let settings={sfxVolume:100,musicVolume:100,quality:'high',musicEnabled:false,maxFps:60};
function loadSettings(){const s=localStorage.getItem('stickmanSettings');if(s)try{Object.assign(settings,JSON.parse(s));}catch(e){}document.getElementById('sfxVolumeSlider').value=settings.sfxVolume;document.getElementById('sfxVolumeValue').innerText=settings.sfxVolume;document.getElementById('musicVolumeSlider').value=settings.musicVolume;document.getElementById('musicVolumeValue').innerText=settings.musicVolume;updateQualityButtons(settings.quality);updateFpsButtons(settings.maxFps);updateMusicBtnText();window.currentQuality=settings.quality;updateMasterGain();}
function saveSettings(){localStorage.setItem('stickmanSettings',JSON.stringify(settings));updateMasterGain();}
function updateMasterGain(){if(window.sfxGain)window.sfxGain.gain.value=settings.sfxVolume/100;if(window.musicGain)window.musicGain.gain.value=settings.musicEnabled?(settings.musicVolume/100)*0.3:0;}
function setQuality(q){settings.quality=q;window.currentQuality=q;updateQualityButtons(q);saveSettings();}
function updateQualityButtons(q){document.querySelectorAll('.quality-btn').forEach(b=>b.classList.toggle('active',b.dataset.quality===q));}
function setMaxFps(f){settings.maxFps=parseInt(f);updateFpsButtons(f);saveSettings();frameInterval=f==0?0:1000/f;}
function updateFpsButtons(f){document.querySelectorAll('.fps-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.fps)===parseInt(f)));}
function updateMusicBtnText(){document.getElementById('toggleMusicBtn').innerHTML=settings.musicEnabled?'🎵 Música ON':'🔇 Música OFF';}
let musicContext=null,musicGain=null;
function initMusic(){if(musicContext)return;musicContext=new(window.AudioContext||window.webkitAudioContext)();musicGain=musicContext.createGain();musicGain.gain.value=settings.musicEnabled?(settings.musicVolume/100)*0.3:0;musicGain.connect(musicContext.destination);window.musicGain=musicGain;let step=0;const n=(f,t,d,v)=>{if(!settings.musicEnabled)return;const o=musicContext.createOscillator(),g=musicContext.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(musicGain);g.gain.setValueAtTime(v,musicContext.currentTime);g.gain.exponentialRampToValueAtTime(0.001,musicContext.currentTime+d);o.start();o.stop(musicContext.currentTime+d);};const noise=(d,v)=>{if(!settings.musicEnabled)return;const b=musicContext.createBufferSource(),buf=musicContext.createBuffer(1,4096,musicContext.sampleRate),data=buf.getChannelData(0);for(let i=0;i<4096;i++)data[i]=Math.random()*2-1;b.buffer=buf;const g=musicContext.createGain();b.connect(g);g.connect(musicGain);g.gain.setValueAtTime(v,musicContext.currentTime);g.gain.exponentialRampToValueAtTime(0.001,musicContext.currentTime+d);b.start();b.stop(musicContext.currentTime+d);};setInterval(()=>{if(!settings.musicEnabled||!musicContext||musicContext.state!=='running')return;const beat=step%4;if(beat===0){n(55,'triangle',0.15,0.5);n(174.61,'square',0.2,0.12);noise(0.08,0.15);}if(beat===1){noise(0.12,0.3);n(98,'sawtooth',0.25,0.2);noise(0.08,0.15);}if(beat===2){n(55,'triangle',0.15,0.5);n(220,'sawtooth',0.2,0.12);noise(0.08,0.15);}if(beat===3){noise(0.12,0.3);n(130.81,'sawtooth',0.25,0.2);n(261.63,'square',0.2,0.1);}step++;},320);}
function startMusic(){if(!musicContext)initMusic();const go=()=>{settings.musicEnabled=true;updateMasterGain();updateMusicBtnText();saveSettings();};if(musicContext.state==='suspended')musicContext.resume().then(go);else go();}
function stopMusic(){settings.musicEnabled=false;updateMasterGain();updateMusicBtnText();saveSettings();}
function toggleMusic(){settings.musicEnabled?stopMusic():startMusic();}
document.getElementById('sfxVolumeSlider').addEventListener('input',e=>{settings.sfxVolume=parseInt(e.target.value);document.getElementById('sfxVolumeValue').innerText=settings.sfxVolume;updateMasterGain();saveSettings();});
document.getElementById('musicVolumeSlider').addEventListener('input',e=>{settings.musicVolume=parseInt(e.target.value);document.getElementById('musicVolumeValue').innerText=settings.musicVolume;updateMasterGain();saveSettings();});
document.querySelectorAll('.quality-btn').forEach(b=>b.addEventListener('click',()=>setQuality(b.dataset.quality)));
document.querySelectorAll('.fps-btn').forEach(b=>b.addEventListener('click',()=>setMaxFps(b.dataset.fps)));
document.getElementById('toggleMusicBtn').addEventListener('click',toggleMusic);
document.getElementById('closeSettingsBtn').addEventListener('click',()=>{document.getElementById('settingsOverlay').style.display='none';resumeGame();});

// ── FPS / PAUSA ───────────────────────────────────────────────────────
let gamePaused=false,lastUpdateTime=0,frameInterval=1000/60;
function pauseGame(){gamePaused=true;}
function resumeGame(){gamePaused=false;}

// ── SFX ───────────────────────────────────────────────────────────────
let sfxContext=null,sfxGain=null;
function initSfx(){if(sfxContext)return;sfxContext=new(window.AudioContext||window.webkitAudioContext)();sfxGain=sfxContext.createGain();sfxGain.gain.value=settings.sfxVolume/100;sfxGain.connect(sfxContext.destination);window.sfxGain=sfxGain;}
function playBeep(freq,type,dur,vol=0.25,decay=0.3){try{if(!sfxContext)initSfx();const ac=sfxContext,o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.value=freq;o.frequency.exponentialRampToValueAtTime(freq*decay,ac.currentTime+dur);g.gain.setValueAtTime(vol*(settings.sfxVolume/100),ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);o.connect(g);g.connect(sfxGain);o.start();o.stop(ac.currentTime+dur);}catch(e){}}
const SFX={shoot:()=>playBeep(900,'sawtooth',0.04,0.35),reload:()=>{playBeep(300,'sine',0.1,0.2);setTimeout(()=>playBeep(500,'sine',0.12,0.25),200);},death:()=>playBeep(80,'sawtooth',0.5,0.3),hit:()=>playBeep(250,'square',0.1,0.2),wave:()=>{playBeep(440,'sine',0.15,0.3);setTimeout(()=>playBeep(660,'sine',0.15,0.3),160);setTimeout(()=>playBeep(880,'sine',0.2,0.4),320);},jump:()=>playBeep(380,'sine',0.12,0.15),coin:()=>playBeep(1200,'sine',0.07,0.2)};

// ── TIENDA ────────────────────────────────────────────────────────────
let totalCoins=0,ownedWeapons=['pistol','scar'],ownedSkins=['ninja'],currentWeapon='scar',currentSkin='ninja';
const WEAPONS={
  pistol:{name:"🔫 Pistola",dmg:10,fireRate:10,maxAmmo:15,price:0,desc:"Básica",bulletStyle:"normal"},
  scar:{name:"🔫 SCAR",dmg:15,fireRate:7,maxAmmo:30,price:115,desc:"Ráfaga",bulletStyle:"scar"},
  shotgun:{name:"💥 Escopeta",dmg:30,fireRate:20,maxAmmo:8,price:230,desc:"3 balas",bulletStyle:"shotgun"},
  laser:{name:"⚡ Láser",dmg:8,fireRate:3,maxAmmo:50,price:173,desc:"Rápido",bulletStyle:"laser"},
  minigun:{name:"🔥 Minigun",dmg:12,fireRate:2,maxAmmo:200,price:1000,desc:"Automática",bulletStyle:"minigun"}
};
const SKINS={
  ninja: {name:"🥷 Ninja Negro", color:"#111111", bandana:"#cc0000", bandana2:"#880000", eye:"#ff2200", price:0},
  white: {name:"⚪ Ninja Blanco",color:"#ffffff",  bandana:"#aaaaaa", bandana2:"#777777", eye:"#333333", price:58},
  red:   {name:"🔴 Ninja Rojo",  color:"#ff4444",  bandana:"#cc0000", bandana2:"#880000", eye:"#ffffff", price:58},
  blue:  {name:"🔵 Ninja Azul",  color:"#44aaff",  bandana:"#0088cc", bandana2:"#005599", eye:"#ffffff", price:58},
  green: {name:"🟢 Ninja Verde", color:"#44ff44",  bandana:"#00aa44", bandana2:"#006622", eye:"#ffffff", price:58},
  gold:  {name:"🟡 Ninja Dorado",color:"#ffcc44",  bandana:"#cc8800", bandana2:"#886600", eye:"#333333", price:173}
};
function loadSave(){const s=localStorage.getItem('stickmanSave');if(s)try{const d=JSON.parse(s);totalCoins=d.coins||0;ownedWeapons=d.ownedWeapons||['pistol','scar'];ownedSkins=d.ownedSkins||['ninja'];currentWeapon=d.currentWeapon||'scar';currentSkin=d.currentSkin||'ninja';if(!ownedWeapons.includes('pistol'))ownedWeapons.push('pistol');if(!ownedWeapons.includes('scar'))ownedWeapons.push('scar');if(!ownedSkins.includes('ninja'))ownedSkins.push('ninja');}catch(e){}else{ownedWeapons=['pistol','scar'];ownedSkins=['ninja'];currentWeapon='scar';currentSkin='ninja';totalCoins=0;saveGame();}}
function saveGame(){localStorage.setItem('stickmanSave',JSON.stringify({coins:totalCoins,ownedWeapons,ownedSkins,currentWeapon,currentSkin}));}
function buyWeapon(id){const wp=WEAPONS[id];if(!wp||ownedWeapons.includes(id))return;if(totalCoins>=wp.price){totalCoins-=wp.price;ownedWeapons.push(id);saveGame();updateShopUI();}}
function buySkin(id){const sk=SKINS[id];if(!sk||ownedSkins.includes(id))return;if(totalCoins>=sk.price){totalCoins-=sk.price;ownedSkins.push(id);saveGame();updateShopUI();}}
function equipWeapon(id){if(ownedWeapons.includes(id)){currentWeapon=id;saveGame();updateShopUI();updateGunStats();}}
function equipSkin(id){if(ownedSkins.includes(id)){currentSkin=id;saveGame();updateShopUI();}}
function resetProgress(){totalCoins=0;ownedWeapons=['pistol','scar'];ownedSkins=['ninja'];currentWeapon='scar';currentSkin='ninja';saveGame();updateShopUI();updateGunStats();}
function updateShopUI(){
  document.getElementById('shopCoins').innerHTML=`💰 MONEDAS: ${totalCoins}`;
  const wg=document.getElementById('weaponsGrid');wg.innerHTML='';
  for(let[id,wp]of Object.entries(WEAPONS)){const owned=ownedWeapons.includes(id),eq=currentWeapon===id;const d=document.createElement('div');d.className=`item-card ${eq?'equipped':''}`;d.innerHTML=`<div class="item-name">${wp.name}</div><div class="item-desc">Daño:${wp.dmg} Cad:${wp.fireRate} Balas:${wp.maxAmmo}</div><div class="item-price">${owned?(eq?'✅ EQUIPADA':'USAR'):`${wp.price}🪙`}</div>`;d.onclick=()=>owned?equipWeapon(id):buyWeapon(id);wg.appendChild(d);}
  const sg=document.getElementById('skinsGrid');sg.innerHTML='';
  for(let[id,sk]of Object.entries(SKINS)){const owned=ownedSkins.includes(id),eq=currentSkin===id;const d=document.createElement('div');d.className=`item-card ${eq?'equipped':''}`;d.style.background=owned?(eq?'#3a3a77':'#111133'):'#331111';const dispCol=sk.color==='#111111'?'#bbbbbb':sk.color;d.innerHTML=`<div class="item-name" style="color:${dispCol}">${sk.name}</div><div style="font-size:20px;margin:4px 0">🥷</div><div class="item-price">${owned?(eq?'✅ ACTIVA':'USAR'):`${sk.price}🪙`}</div>`;d.onclick=()=>owned?equipSkin(id):buySkin(id);sg.appendChild(d);}
}
function openShop(){pauseGame();updateShopUI();document.getElementById('shopOverlay').style.display='flex';}
function closeShop(){document.getElementById('shopOverlay').style.display='none';resumeGame();}
document.getElementById('closeShopBtn').onclick=closeShop;
document.getElementById('resetShopBtn').onclick=()=>{if(confirm("¿Borrar todo el progreso?"))resetProgress();};

// ── CONSTANTES ────────────────────────────────────────────────────────
const GROUND_Y=330,FLOOR=390,CAMERA_OFFSET=70;
const CITY=[];
(function(){let cx=-200;for(let i=0;i<150;i++){let w=55+((i*37+11)%70),h=80+((i*53+7)%180),wins=[];for(let wy=12;wy<h-12;wy+=20)for(let wx=8;wx<w-8;wx+=14)wins.push({wx,wy,on:((i+wx+wy)%3)!==0});CITY.push({x:cx,w,h,wins});cx+=w+10+((i*19)%30);}})();

// ── ESTADO ────────────────────────────────────────────────────────────
let score=0,wave=1,frameN=0,screenShake=0,gameState='playing',waveClearTimer=0;
let particles=[],floatTexts=[],rainDrops=[],spawnQueue=[],spawnTimer=0;
const SPAWN_INTERVAL=600;
let bullets=[],enemyProjectiles=[],cameraX=0,stormActive=false,difficultyMultiplier=1.0;
let shootingHeld=false;

let gun={ammo:30,maxAmmo:30,reloading:false,reloadTimer:0,reloadTime:130,cooldown:0,fireRate:7,muzzleFlash:0,dmg:15,bulletStyle:'scar'};
function updateGunStats(){const wp=WEAPONS[currentWeapon];if(wp){gun.maxAmmo=wp.maxAmmo;gun.fireRate=wp.fireRate;gun.dmg=wp.dmg;gun.reloadTime=100+wp.fireRate*2;gun.bulletStyle=wp.bulletStyle;if(!gun.reloading)gun.ammo=gun.maxAmmo;}}

const player={x:200,y:GROUND_Y,velX:0,velY:0,speed:5,jumpF:-14,gravity:0.55,grounded:false,hitTimer:0,invincible:0,health:100,maxHealth:100,facing:1,walkFrame:0,alive:true};
let enemies=[];
const ETYPES={normal:{hp:60,spd:1.6,col:'#dd2200',range:68,dmg:8,cd:90,sc:1.0,coinValue:1,ranged:false},fast:{hp:35,spd:3.0,col:'#ff6600',range:58,dmg:5,cd:55,sc:0.85,coinValue:2,ranged:false},tank:{hp:160,spd:0.9,col:'#9900cc',range:78,dmg:16,cd:120,sc:1.25,coinValue:3,ranged:false},heavy:{hp:200,spd:0.7,col:'#44aa44',range:250,dmg:12,cd:100,sc:1.3,coinValue:5,ranged:true,projectileDelay:70}};
function mkEnemy(x,type='normal'){const t=ETYPES[type];let bHp=Math.floor(difficultyMultiplier*10),bSpd=difficultyMultiplier*0.2;return{x,y:GROUND_Y,velX:0,velY:0,type,hp:t.hp+bHp,maxHp:t.hp+bHp,spd:Math.min(t.spd+bSpd,5.5),col:t.col,range:t.range,dmg:t.dmg+Math.floor(difficultyMultiplier*2),cd:Math.max(t.cd-Math.floor(difficultyMultiplier*5),40),sc:t.sc,coinValue:t.coinValue,ranged:t.ranged||false,projectileCd:0,projectileDelay:t.projectileDelay||0,atkTimer:0,attackTimer:0,attacking:false,hitTimer:0,facing:-1,walkFrame:0,alive:true,grounded:false};}
function spawnNext(){if(!spawnQueue.length)return;const s=spawnQueue.shift();let ex=player.x+player.facing*(550+Math.random()*250);enemies.push(mkEnemy(ex,s.type));floatText(player.x+15,player.y-70,'⚠ ENEMIGO ENTRANTE','#ff4400');SFX.hit();}
function spawnWave(n){
  enemies=[];spawnQueue=[];spawnTimer=0;
  const isStorm=(n%10===0);
  if(isStorm&&!stormActive){stormActive=true;difficultyMultiplier+=0.25;for(let i=0;i<30;i++)rainDrops.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,speed:5+Math.random()*8});floatText(player.x+15,player.y-100,'🌧️ ¡TORMENTA! DIFICULTAD +25%','#88ccff');}
  else if(!isStorm&&stormActive){stormActive=false;rainDrops=[];}
  let count=Math.min(Math.floor((Math.min(2+n,8))*(stormActive?1.5:1)),12);
  for(let i=0;i<count;i++){let type='normal';if(n>=5||stormActive){const r=Math.random();type=r<0.2?'heavy':r<0.5?'tank':r<0.75?'fast':'normal';}else if(n>=3){const r=Math.random();type=r<0.15?'heavy':r<0.4?'tank':r<0.7?'fast':'normal';}else type=(n>=2&&i%2===1)?'fast':'normal';spawnQueue.push({type});}
  spawnNext();spawnTimer=SPAWN_INTERVAL;
  player.health=player.maxHealth;player.invincible=0;player.hitTimer=0;gun.ammo=gun.maxAmmo;gun.reloading=false;
}
spawnWave(wave);

function resetGame(){score=0;wave=1;cameraX=0;frameN=0;screenShake=0;gameState='playing';waveClearTimer=0;particles=[];floatTexts=[];rainDrops=[];spawnQueue=[];spawnTimer=0;bullets=[];enemyProjectiles=[];stormActive=false;difficultyMultiplier=1.0;player.x=200;player.y=GROUND_Y;player.velX=0;player.velY=0;player.grounded=false;player.hitTimer=0;player.invincible=0;player.health=100;player.facing=1;player.walkFrame=0;player.alive=true;updateGunStats();gun.ammo=gun.maxAmmo;gun.reloading=false;gun.cooldown=0;gun.muzzleFlash=0;spawnWave(wave);}

// ── INPUT ─────────────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;if(gameState==='gameover'&&(e.code==='KeyR'||e.code==='Enter'))resetGame();if(e.code==='KeyM'){e.preventDefault();openShop();}if(e.code==='KeyO'){e.preventDefault();pauseGame();document.getElementById('settingsOverlay').style.display='flex';}e.preventDefault();});
document.addEventListener('keyup',e=>keys[e.code]=false);
canvas.addEventListener('mousedown',e=>{e.preventDefault();if(e.button===0)shootingHeld=true;});
canvas.addEventListener('mouseup',e=>{if(e.button===0)shootingHeld=false;});
canvas.addEventListener('mouseleave',()=>shootingHeld=false);
canvas.addEventListener('touchstart',e=>{e.preventDefault();shootingHeld=true;},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();shootingHeld=false;},{passive:false});
canvas.addEventListener('touchcancel',e=>{e.preventDefault();shootingHeld=false;},{passive:false});

if(isMobile){
  const tb=(id,key)=>{const el=document.getElementById(id);el.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true;},{passive:false});el.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false;},{passive:false});};
  tb('btnLeft','KeyA');tb('btnRight','KeyD');tb('btnJump','Space');
  document.getElementById('btnShoot').addEventListener('touchstart',e=>{e.preventDefault();shootingHeld=true;},{passive:false});
  document.getElementById('btnShoot').addEventListener('touchend',e=>{e.preventDefault();shootingHeld=false;},{passive:false});
  document.getElementById('btnReload').addEventListener('touchstart',e=>{e.preventDefault();keys['KeyG']=true;setTimeout(()=>keys['KeyG']=false,100);},{passive:false});
  document.getElementById('btnShop').addEventListener('touchstart',e=>{e.preventDefault();openShop();},{passive:false});
  document.getElementById('btnSettings').addEventListener('touchstart',e=>{e.preventDefault();pauseGame();document.getElementById('settingsOverlay').style.display='flex';},{passive:false});
}

function handleShoot(){
  if(gamePaused||gameState!=='playing'||!player.alive)return;
  if(gun.cooldown<=0&&!gun.reloading&&gun.ammo>0){
    gun.ammo--;
    gun.cooldown=gun.fireRate;
    gun.muzzleFlash=5;
    let bx=player.x+15+player.facing*56,by=player.y+20;
    if(gun.bulletStyle==='shotgun'){
      for(let i=-1;i<=1;i++)bullets.push({x:bx,y:by+i*4,vx:player.facing*18+i*2,alive:true,dmg:gun.dmg,style:gun.bulletStyle});
    }else{
      bullets.push({x:bx,y:by,vx:player.facing*20,alive:true,dmg:gun.dmg,style:gun.bulletStyle});
    }
    SFX.shoot();
    if(gun.ammo<=0){gun.reloading=true;gun.reloadTimer=gun.reloadTime;SFX.reload();}
  }
}

function spark(x,y,col,n=8,spd=4){let fn=window.currentQuality==='low'?Math.floor(n/2):n;for(let i=0;i<fn;i++){let a=Math.random()*Math.PI*2,s=1+Math.random()*spd;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,dec:0.04+Math.random()*0.04,col,sz:1.5+Math.random()*3});}}
function floatText(x,y,txt,col='#fff'){floatTexts.push({x,y,txt,col,life:1,vy:-1.8});}
function addCoins(a){totalCoins+=a;saveGame();floatText(player.x+15,player.y-25,`+${a}🪙`,'#ffcc00');SFX.coin();}

// ── UPDATE ────────────────────────────────────────────────────────────
function update(ct){
  requestAnimationFrame(update);
  if(frameInterval>0&&ct-lastUpdateTime<frameInterval)return;
  lastUpdateTime=ct;
  if(gamePaused){draw();return;}
  if(shootingHeld && !gamePaused && gameState==='playing' && player.alive) handleShoot();
  frameN++;
  if(gameState==='gameover'){draw();return;}
  if(gameState==='waveclear'){waveClearTimer--;if(waveClearTimer<=0){wave++;spawnWave(wave);SFX.wave();gameState='playing';}updateCamera();draw();return;}

  if(player.alive){
    player.velX=0;
    if(!player.hitTimer){if(keys['KeyD']){player.velX=player.speed;player.facing=1;}if(keys['KeyA']){player.velX=-player.speed;player.facing=-1;}}
    if(keys['Space']&&player.grounded){player.velY=player.jumpF;player.grounded=false;SFX.jump();}
    if(keys['KeyG']&&!gun.reloading&&gun.ammo<gun.maxAmmo){gun.reloading=true;gun.reloadTimer=gun.reloadTime;SFX.reload();}
    if(gun.cooldown>0)gun.cooldown--;if(gun.muzzleFlash>0)gun.muzzleFlash--;
    if(gun.reloading){gun.reloadTimer--;if(gun.reloadTimer<=0){gun.reloading=false;gun.ammo=gun.maxAmmo;}}
    bullets=bullets.filter(b=>b.alive&&Math.abs(b.x-player.x)<1600);
    bullets.forEach(b=>{b.x+=b.vx;enemies.forEach(en=>{if(!en.alive||!b.alive)return;if(Math.abs(b.x-(en.x+15))<20&&Math.abs(b.y-(en.y+30))<38){b.alive=false;en.hp-=b.dmg;en.hitTimer=7;screenShake=4;spark(b.x,b.y,'#ffff00',5,3);addCoins(en.coinValue);score+=b.dmg;if(en.hp<=0){en.alive=false;score+=50*wave;SFX.death();spark(en.x+15,en.y+30,en.col,20,6);floatText(en.x+15,en.y-5,`+${50*wave}`,'#0f0');}}});});
    enemyProjectiles=enemyProjectiles.filter(p=>p.alive&&Math.abs(p.x-player.x)<1600);
    enemyProjectiles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(Math.abs(p.x-(player.x+15))<15&&Math.abs(p.y-(player.y+30))<25&&player.invincible<=0&&player.alive){player.health-=p.dmg;player.hitTimer=16;player.invincible=45;player.velX=-p.dir*4;player.velY=-4;screenShake=8;SFX.hit();spark(player.x+15,player.y+25,'#ff3300',8,4);floatText(player.x+15,player.y-10,`-${p.dmg}`,'#ff4444');if(player.health<=0){player.health=0;player.alive=false;setTimeout(()=>gameState='gameover',1400);}p.alive=false;}});
    player.velY+=player.gravity;player.x+=player.velX;player.y+=player.velY;
    if(player.y>=GROUND_Y){player.y=GROUND_Y;player.velY=0;player.grounded=true;}
    if(player.hitTimer>0)player.hitTimer--;if(player.invincible>0)player.invincible--;if(Math.abs(player.velX)>0&&player.grounded)player.walkFrame+=0.22;
  }
  enemies.forEach(en=>{
    if(!en.alive)return;
    en.velY+=0.55;en.y+=en.velY;if(en.y>=GROUND_Y){en.y=GROUND_Y;en.velY=0;en.grounded=true;}
    let dx=(player.x+15)-(en.x+15),dist=Math.abs(dx);en.facing=Math.sign(dx);
    if(en.ranged){en.velX=dist>en.range?en.facing*en.spd:0;if(en.projectileCd<=0&&player.alive&&dist<400){en.projectileCd=en.projectileDelay;let angle=Math.atan2((player.y+30)-(en.y+30),(player.x+15)-(en.x+15)),sp=12;enemyProjectiles.push({x:en.x+15,y:en.y+30,vx:Math.cos(angle)*sp,vy:Math.sin(angle)*sp,alive:true,dmg:en.dmg,dir:en.facing});SFX.shoot();}else if(en.projectileCd>0)en.projectileCd--;}
    else{if(!en.attacking){if(dist>en.range)en.velX=en.facing*en.spd;else{en.velX=0;if(en.atkTimer<=0&&player.alive){en.attacking=true;en.attackTimer=28;en.atkTimer=en.cd;const snapX=en.x;setTimeout(()=>{if(!en.alive)return;if(Math.abs((player.x+15)-(snapX+15))<en.range+25&&player.invincible<=0&&player.alive){player.health-=en.dmg;player.hitTimer=16;player.invincible=45;player.velX=-en.facing*5;player.velY=-5;screenShake=10;SFX.hit();spark(player.x+15,player.y+25,'#ff3300',8,4);floatText(player.x+15,player.y-10,`-${en.dmg}`,'#ff4444');if(player.health<=0){player.health=0;player.alive=false;setTimeout(()=>gameState='gameover',1400);}}},220);}}}  }
    en.x+=en.velX;if(en.attackTimer>0)en.attackTimer--;else en.attacking=false;if(en.atkTimer>0)en.atkTimer--;if(en.hitTimer>0)en.hitTimer--;if(Math.abs(en.velX)>0&&en.grounded)en.walkFrame+=0.18;
  });
  if(enemies.length>0&&enemies.every(e=>!e.alive)&&spawnQueue.length===0&&gameState==='playing'){gameState='waveclear';waveClearTimer=180;score+=wave*200;floatText(player.x+15,player.y-80,`WAVE ${wave} CLEAR!`,'#ffff00');}
  particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=p.dec;});
  floatTexts=floatTexts.filter(f=>f.life>0);floatTexts.forEach(f=>{f.y+=f.vy;f.life-=0.018;});
  if(spawnQueue.length>0){spawnTimer--;if(spawnTimer<=0){spawnNext();spawnTimer=SPAWN_INTERVAL;}}
  if(screenShake>0)screenShake-=0.6;updateCamera();draw();
}
function updateCamera(){let t=player.x-canvas.width/2+CAMERA_OFFSET;cameraX+=(t-cameraX)*0.1;}

// ── DIBUJO DE ARMAS REALISTAS (con nueva escopeta) ────────────────────
function drawWeapon(ctx, wpId, muzzleFlash){
  if(wpId === 'pistol'){
    ctx.fillStyle='#3a3a44'; ctx.fillRect(0,-4,18,8);
    ctx.fillStyle='#555'; ctx.fillRect(18,-2,10,5);
    ctx.fillStyle='#222'; ctx.fillRect(-6,-3,6,6);
    ctx.fillStyle='#cc8844'; ctx.fillRect(2,3,8,4);
    ctx.fillStyle='#666'; ctx.fillRect(10,-6,8,2);
  } else if(wpId === 'scar'){
    ctx.fillStyle='#2a2a33'; ctx.fillRect(0,-6,26,11);
    ctx.fillStyle='#444'; ctx.fillRect(26,-3,18,7);
    ctx.fillStyle='#111'; ctx.fillRect(44,-4,5,8);
    ctx.fillStyle='#1a1a22'; ctx.fillRect(-10,-5,10,8);
    ctx.fillStyle='#0a0a0f'; ctx.fillRect(6,5,9,8);
    ctx.fillStyle='#666'; ctx.fillRect(5,-8,14,2);
    ctx.strokeStyle='#888'; ctx.strokeRect(0,-6,26,11);
  } else if(wpId === 'shotgun'){
    // Diseño nuevo: escopeta de corredera (pump-action)
    ctx.fillStyle='#8B5A2B'; // culata de madera
    ctx.fillRect(-8,-5,12,9); // culata
    ctx.fillStyle='#4a4a55'; // cuerpo metálico
    ctx.fillRect(0,-7,32,13); // receptor
    ctx.fillStyle='#666'; // cañón
    ctx.fillRect(32,-3,14,6);
    // Cargador tubular bajo el cañón
    ctx.fillStyle='#555';
    ctx.fillRect(8,5,28,4);
    // Bomba delantera (pump)
    ctx.fillStyle='#2a2a33';
    ctx.fillRect(20,2,12,4);
    // Elevación delantera
    ctx.fillStyle='#888';
    ctx.fillRect(40,-4,6,2);
    // Detalles
    ctx.fillStyle='#333';
    ctx.fillRect(12,7,6,3);
    ctx.strokeStyle='#aaa';
    ctx.strokeRect(0,-7,32,13);
  } else if(wpId === 'laser'){
    ctx.fillStyle='#44ffaa'; ctx.fillRect(0,-4,28,8);
    ctx.fillStyle='#22cc88'; ctx.fillRect(28,-3,18,6);
    ctx.fillStyle='#00aa66'; ctx.fillRect(-8,-3,8,6);
    ctx.fillStyle='#88ffcc'; ctx.fillRect(8,-9,14,3);
    ctx.fillStyle='#fff'; ctx.fillRect(40,-2,4,4);
  } else if(wpId === 'minigun'){
    ctx.fillStyle='#4a4a55'; ctx.fillRect(0,-8,32,14);
    ctx.fillStyle='#2a2a33'; ctx.fillRect(32,-5,20,9);
    ctx.fillStyle='#555'; ctx.beginPath(); ctx.ellipse(20,2,10,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#333'; ctx.beginPath(); ctx.ellipse(20,2,7,6,0,0,Math.PI*2); ctx.fill();
    for(let i=0;i<6;i++){ let ang = i * Math.PI/3; let x = 42 + Math.cos(ang)*5; let y = -2 + Math.sin(ang)*4; ctx.fillStyle='#888'; ctx.fillRect(x-2,y-2,5,4); }
    ctx.fillStyle='#666'; ctx.fillRect(48,-3,14,6);
    ctx.fillStyle='#222'; ctx.fillRect(62,-4,5,8);
    ctx.fillStyle='#aaa'; ctx.fillRect(10,-11,14,3);
  }
  if(muzzleFlash>0 && window.currentQuality!=='low'){
    ctx.globalAlpha=muzzleFlash/5;
    ctx.fillStyle='#ffffaa';
    ctx.shadowColor='#ffff00';
    ctx.shadowBlur=18;
    ctx.beginPath(); ctx.arc(70,0,9,0,Math.PI*2); ctx.fill();
    for(let a=0;a<6;a++){ let ra=a*Math.PI/3; ctx.beginPath(); ctx.moveTo(70,0); ctx.lineTo(70+Math.cos(ra)*16, Math.sin(ra)*16); ctx.stroke(); }
    ctx.globalAlpha=1;
  }
}

// ── DIBUJO DEL STICKMAN (con armas mejoradas) ─────────────────────────
function drawStick(worldX,worldY,col,facing,walkF,hitT,sc,showGun,weaponId,isPlayer,skinId){
  ctx.save();
  ctx.translate(worldX-cameraX+15*sc,worldY+60*sc);
  ctx.scale(sc,sc);ctx.translate(-15,-60);
  const sk=isPlayer?(SKINS[skinId]||SKINS.ninja):null;
  const bodyCol=isPlayer?sk.color:col;
  ctx.strokeStyle=hitT>0?'#ff3333':bodyCol;
  ctx.lineWidth=3;ctx.lineCap='round';
  if(window.currentQuality!=='low'){ctx.shadowColor=hitT>0?'#ff0000':bodyCol;ctx.shadowBlur=hitT>0?12:6;}
  if(hitT>0){ctx.translate(15,30);ctx.rotate(-facing*0.28);ctx.translate(-15,-30);}
  const legS=Math.sin(walkF)*13,armS=Math.sin(walkF+Math.PI)*10;
  ctx.beginPath();ctx.arc(15,8,9,0,Math.PI*2);ctx.stroke();
  if(isPlayer&&window.currentQuality!=='low'){
    ctx.fillStyle=sk.eye;
    ctx.beginPath();ctx.arc(15+facing*4,7,2,0,Math.PI*2);ctx.fill();
  }
  if(isPlayer&&window.currentQuality!=='low'){
    const waveF=Math.sin(walkF*1.8)*2.5;
    ctx.fillStyle=sk.bandana;
    ctx.fillRect(15-12,15,24,4);
    ctx.beginPath();
    ctx.moveTo(15-facing*4,15);
    ctx.lineTo(15-facing*34,11+waveF);
    ctx.lineTo(15-facing*46,15+waveF);
    ctx.lineTo(15-facing*32,20+waveF);
    ctx.lineTo(15-facing*4,19);
    ctx.closePath();ctx.fill();
    ctx.fillStyle=sk.bandana2;
    ctx.beginPath();
    ctx.moveTo(15-facing*4,18);
    ctx.lineTo(15-facing*32,19+waveF);
    ctx.lineTo(15-facing*46,15+waveF);
    ctx.lineTo(15-facing*36,21+waveF);
    ctx.lineTo(15-facing*4,20);
    ctx.closePath();ctx.fill();
    ctx.fillStyle=sk.bandana;
    ctx.beginPath();
    ctx.moveTo(15-facing*4,19);
    ctx.lineTo(15-facing*26,22+waveF*0.8);
    ctx.lineTo(15-facing*36,27+waveF*0.8);
    ctx.lineTo(15-facing*22,29+waveF*0.8);
    ctx.lineTo(15-facing*4,23);
    ctx.closePath();ctx.fill();
    ctx.fillStyle=sk.bandana2;
    ctx.beginPath();
    ctx.moveTo(15-facing*4,22);
    ctx.lineTo(15-facing*22,28+waveF*0.8);
    ctx.lineTo(15-facing*36,27+waveF*0.8);
    ctx.lineTo(15-facing*24,30+waveF*0.8);
    ctx.lineTo(15-facing*4,23);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle=sk.bandana2;ctx.lineWidth=1.2;
    ctx.strokeRect(15-12,15,24,4);
    ctx.strokeStyle=hitT>0?'#ff3333':bodyCol;ctx.lineWidth=3;
  }
  ctx.beginPath();ctx.moveTo(15,17);ctx.lineTo(15,39);ctx.stroke();
  ctx.beginPath();
  if(showGun){ctx.moveTo(15,22);ctx.lineTo(15+facing*22,20);ctx.moveTo(15,22);ctx.lineTo(15+facing*14,29);}
  else{ctx.moveTo(15,22);ctx.lineTo(15+facing*(9+armS),35);ctx.moveTo(15,22);ctx.lineTo(15-facing*(9+armS),35);}
  ctx.stroke();
  ctx.beginPath();ctx.moveTo(15,39);ctx.lineTo(15+legS,59);ctx.stroke();
  ctx.beginPath();ctx.moveTo(15,39);ctx.lineTo(15-legS,59);ctx.stroke();
  if(showGun){
    ctx.save();ctx.translate(15+facing*22,20);ctx.scale(facing,1);ctx.shadowBlur=0;
    drawWeapon(ctx, weaponId||currentWeapon, gun.muzzleFlash);
    ctx.restore();
  }
  ctx.restore();
}

function drawHPBar(wx,wy,hp,max,width){let sx=wx-cameraX;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(sx,wy,width,5);let pct=hp/max;ctx.fillStyle=pct>0.5?'#00ff66':pct>0.25?'#ffaa00':'#ff2200';ctx.fillRect(sx,wy,width*pct,5);ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.strokeRect(sx,wy,width,5);}

// ── DRAW ──────────────────────────────────────────────────────────────
function draw(){
  ctx.save();
  let sx=screenShake>0?(Math.random()-.5)*screenShake:0,sy=screenShake>0?(Math.random()-.5)*screenShake:0;
  ctx.translate(sx,sy);
  let sky=ctx.createLinearGradient(0,0,0,canvas.height);sky.addColorStop(0,stormActive?'#4a6a8a':'#050010');sky.addColorStop(1,stormActive?'#7a9aba':'#150028');ctx.fillStyle=sky;ctx.fillRect(0,0,canvas.width,canvas.height);
  if(stormActive){rainDrops.forEach(d=>{ctx.fillStyle='rgba(180,220,255,0.6)';ctx.fillRect(d.x-cameraX*0.8,d.y,1,6);d.y+=d.speed;if(d.y>canvas.height)d.y=-10;});}
  else{ctx.fillStyle='rgba(255,255,255,0.6)';for(let i=0;i<60;i++){let bx=((i*137+cameraX*0.05)%canvas.width+canvas.width)%canvas.width,by=(i*91)%200;ctx.fillRect(bx,by,1,1);}}
  let px=cameraX*0.25,cityW=CITY[CITY.length-1].x+200;
  CITY.forEach(b=>{let bx=b.x-px;while(bx>canvas.width+200)bx-=cityW;while(bx<-300)bx+=cityW;let by2=FLOOR-b.h;ctx.fillStyle=stormActive?'#2a4a6a':'#0d0020';ctx.fillRect(bx,by2,b.w,b.h);b.wins.forEach(w=>{if(w.on){ctx.fillStyle=stormActive?'rgba(255,255,200,0.2)':'rgba(255,200,80,0.13)';ctx.fillRect(bx+w.wx,by2+w.wy,5,7);}});});
  ctx.shadowColor=stormActive?'#88aaff':'#7700ff';ctx.shadowBlur=20;ctx.fillStyle=stormActive?'#88aaff':'#5500cc';ctx.fillRect(0,FLOOR,canvas.width,3);ctx.shadowBlur=0;ctx.fillStyle=stormActive?'#3a5a7a':'#1a1a2e';ctx.fillRect(0,FLOOR+3,canvas.width,canvas.height-FLOOR-3);
  ctx.strokeStyle='rgba(85,0,204,0.2)';ctx.lineWidth=1;let gOff=(cameraX*0.6)%60;for(let gx=-gOff%60;gx<canvas.width;gx+=60){ctx.beginPath();ctx.moveTo(gx,FLOOR);ctx.lineTo(gx-40,canvas.height);ctx.stroke();}
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x-cameraX,p.y,p.sz,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
  bullets.forEach(b=>{if(!b.alive)return;ctx.save();if(b.style==='laser'){ctx.strokeStyle='#44ffaa';ctx.lineWidth=3;if(window.currentQuality!=='low')ctx.shadowBlur=12;}else if(b.style==='scar'||b.style==='minigun'){ctx.strokeStyle='#ffaa44';ctx.lineWidth=2.5;if(window.currentQuality!=='low')ctx.shadowBlur=8;}else{ctx.strokeStyle='#ffff00';ctx.lineWidth=2;}ctx.beginPath();ctx.moveTo(b.x-cameraX,b.y);ctx.lineTo(b.x-cameraX-b.vx*5,b.y);ctx.stroke();ctx.restore();});
  enemyProjectiles.forEach(p=>{if(!p.alive)return;ctx.save();ctx.strokeStyle='#44ff44';ctx.lineWidth=3;ctx.shadowBlur=6;ctx.beginPath();ctx.moveTo(p.x-cameraX,p.y);ctx.lineTo(p.x-cameraX-p.vx*4,p.y);ctx.stroke();ctx.restore();});
  enemies.forEach(en=>{if(!en.alive)return;drawStick(en.x,en.y,en.col,en.facing,en.walkFrame,en.hitTimer,en.sc,false,null,false,null);drawHPBar(en.x,en.y-16,en.hp,en.maxHp,Math.round(40*en.sc));});
  if(player.alive){let show=player.invincible>0?(Math.floor(frameN/4)%2===0):true;if(show)drawStick(player.x,player.y,null,player.facing,player.walkFrame,player.hitTimer,1,true,currentWeapon,true,currentSkin);}
  floatTexts.forEach(f=>{ctx.globalAlpha=f.life;ctx.fillStyle=f.col;ctx.font='bold 14px Courier New';ctx.textAlign='center';if(window.currentQuality!=='low'){ctx.shadowColor=f.col;ctx.shadowBlur=8;}ctx.fillText(f.txt,f.x-cameraX,f.y);ctx.shadowBlur=0;});ctx.globalAlpha=1;
  ctx.restore();drawHUD();
  if(gameState==='gameover')drawGameOver();
  if(gameState==='waveclear')drawWaveClear();
}
function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(10,10,206,22);let hp=player.health/player.maxHealth;ctx.fillStyle=hp>0.5?'#00ff66':hp>0.25?'#ffaa00':'#ff2200';ctx.fillRect(12,12,202*hp,18);ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.strokeRect(10,10,206,22);ctx.fillStyle='#fff';ctx.font='bold 11px Courier New';ctx.textAlign='left';ctx.fillText(`HP  ${player.health} / ${player.maxHealth}`,15,25);
  ctx.shadowColor='#ffff00';ctx.shadowBlur=12;ctx.fillStyle='#ffff00';ctx.font='bold 20px Courier New';ctx.textAlign='center';ctx.fillText(`${score}`,canvas.width/2,26);ctx.shadowBlur=0;
  ctx.fillStyle='#ff6600';ctx.font='bold 13px Courier New';ctx.textAlign='right';ctx.fillText(`WAVE ${wave}`,canvas.width-12,26);
  let alive=enemies.filter(e=>e.alive).length;ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='11px Courier New';ctx.fillText(`ENEMIGOS: ${alive}`,canvas.width-12,44);
  if(spawnQueue.length>0){let secs=Math.ceil(spawnTimer/60);ctx.fillStyle='#ff4400';ctx.font='bold 12px Courier New';ctx.shadowColor='#ff4400';ctx.shadowBlur=8;ctx.fillText(`⚠ PRÓXIMO: ${secs}s`,canvas.width-12,62);ctx.shadowBlur=0;}
  let ammoY=68;
